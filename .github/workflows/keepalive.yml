name: Keep alive

# Keeps the free Render instance warm so visitors/crawlers don't hit a cold start.
# GitHub's scheduled timing is unreliable, so each run pings every 60s for ~55 min —
# one trigger covers nearly an hour, and cancel-in-progress restarts the clock on
# each new trigger. (Public-repo Actions minutes are free/unlimited.)
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Keep the site warm
        run: |
          end=$(( $(date +%s) + 3300 ))   # run for ~55 minutes
          while [ "$(date +%s)" -lt "$end" ]; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 \
              https://drophound-xyy4.onrender.com/api/health || echo 000)
            echo "$(date -u +%H:%M:%S) ping -> $code"
            sleep 60
          done
